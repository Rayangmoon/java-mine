server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stock_watchlist?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    # 下划线转驼峰：数据库 stock_code → Java stockCode（自动映射）
    map-underscore-to-camel-case: true
    # 开发时打印 SQL，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
